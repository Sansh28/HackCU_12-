name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  deployment_assumptions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical frontend deployment path
        run: |
          test -f apps/frontend/package.json
          test -f apps/frontend/package-lock.json
          test -f apps/frontend/next.config.ts
          test ! -f package.json
          test ! -f vercel.json
          test ! -f savant-frontend/package.json

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest tests
      - name: Backend smoke flow
        run: pytest tests/test_api_flows.py -k smoke

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Test
        run: npm run test
      - name: Lint
        run: npm run lint
      - name: TypeScript
        run: npm run typecheck
      - name: Build
        run: npm run build

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/extension/package-lock.json
      - name: Install extension dependencies
        run: npm ci
      - name: Test
        run: npm run test:ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
